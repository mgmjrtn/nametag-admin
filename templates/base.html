<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Nametag Admin{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #111;
      --surface:   #1a1a1a;
      --surface-2: #222;
      --border:    #333;
      --border-h:  #444;
      --text:      #fff;
      --text-body: #e0e4ea;
      --text-dim:  #93a3b8;
      --accent:    #4d8eff;
      --accent-h:  #6ba1ff;
      --danger:    #f87171;
      --danger-h:  rgba(239,68,68,.1);
      --success:   #4ade80;
      --radius:    10px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text-body);
      line-height: 1.6;
      min-height: 100vh;
    }

    a { color: var(--accent); text-decoration: none; }
    a:hover { color: var(--accent-h); }

    .topbar {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 28px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

      background-image: url("data:image/png;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/4gHYSUNDX1BST0ZJTEUAAQEAAAHIAAAAAAQwAABtbnRyUkdCIFhZWiAH4AABAAEAAAAAAABhY3NwAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAQAA9tYAAQAAAADTLQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAlkZXNjAAAA8AAAACRyWFlaAAABFAAAABRnWFlaAAABKAAAABRiWFlaAAABPAAAABR3dHB0AAABUAAAABRyVFJDAAABZAAAAChnVFJDAAABZAAAAChiVFJDAAABZAAAAChjcHJ0AAABjAAAADxtbHVjAAAAAAAAAAEAAAAMZW5VUwAAAAgAAAAcAHMAUgBHAEJYWVogAAAAAAAAb6IAADj1AAADkFhZWiAAAAAAAABimQAAt4UAABjaWFlaIAAAAAAAACSgAAAPhAAAts9YWVogAAAAAAAA9tYAAQAAAADTLXBhcmEAAAAAAAQAAAACZmYAAPKnAAANWQAAE9AAAApbAAAAAAAAAABtbHVjAAAAAAAAAAEAAAAMZW5VUwAAACAAAAAcAEcAbwBvAGcAbABlACAASQBuAGMALgAgADIAMAAxADb/2wBDAAUDBAQEAwUEBAQFBQUGBwwIBwcHBw8LCwkMEQ8SEhEPERETFhwXExQaFRERGCEYGh0dHx8fExciJCIeJBweHx7/2wBDAQUFBQcGBw4ICA4eFBEUHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh7/wAARCAC4AJ4DASIAAhEBAxEB/8QAHQABAAICAwEBAAAAAAAAAAAAAAgJAQcDBAYCBf/EAEgQAAEDAwIDBAQKBwYFBQAAAAEAAgMEBREGBwgSIQkxQVETN2FxFBcyV3V2gbO00iIjUpGUlbEVQmKCksEWJDNyoZOissLR/8QAFAEBAAAAAAAAAAAAAAAAAAAAAP/EABQRAQAAAAAAAAAAAAAAAAAAAAD/2gAMAwEAAhEDEQA/AJloiICIiAiIgIiICIiAiIgIiICIiAiIgIiICIiAiLq3Otprdb6m4Vk7IaaljdNNI49GMaMkn7AUHYJ78HOPBfmXPUmnrW3Nzv1rofP4RVxx4/e4KvHfziM1jr+8VVFZbpVWXTjJXMp6elldG+ZmSA6VwwTkdeXuC0bLI+WRz5Hue5xyS45JKC2aTdDbWIkS7haTYR0PNeaf864/jY2u+crRv87pvzqppEFsvxsbXfOVo3+eU350+Nja75ytG/zym/Oqm06eSC2T42NrvnK0b/PKb86fGxtd85Wjf55TfnVTgBxnHTzwvlBbL8bG13zlaN/nlN+dcsW52203/R3D0nIT+zeKc/0eqlUQXB2rUen7sWi1322V2e74NVxyZ/0kr9MEHxz7vBU2RSyxSNkikex7TlrmuIIPsK35w9cR2q9CXmituo7nW3vTMjmxzQ1EjpZqZucB8TnZP6P7HcQMdCgsZRcFDVU9dQwVtHOyennjbLFIw5a9jhkOB8QQcrnQEREBERAWluNW8yWfh21F6F5ZLWuhogQcHlfI3mH2sDv/ACt0qN3aISmLYuiaCR6W+wMOD3/qZj/sgr5cTk5KwsnvWEBERBvzgn2+0zr3c6qh1PTx1lLbaA1TKKT5M7y9rRzeYGc48entU7WbXbatY1rdvtJgAYAFmp/yKq/R+pr5pG/QXzTlymt1wgBDJoj1we9pB6EHuIPQrbo4sN6gMHUNCfb/AGZB+VBPGTa/bRzXMO3ulCCOoNogGc/5FAzjQ0FpzQe7raXTEUdPR3ChZWyUcfyaZ7nvYQ0eDTyhwHgSQOmFl3FfvW5pH/EFCMgjItsOf/itRat1FfNVagqr5qG4zXC41TuaW     .topbar .brand { font-size: 16px; font-weight: 700; color: var(--text); letter-spacing: .3px; }
    .topbar .label { font-size: 15px; font-weight: 600; letter-spacing: .3px; color: var(--text-dim); }
    .topbar .home-link { margin-left: auto; font-size: 13px; color: var(--text-dim); }
    .topbar .home-link:hover { color: var(--text); }

    .flash { padding: 10px 28px; font-size: 13px; border-bottom: 1px solid var(--border); }
    .flash.success { background: rgba(34,197,94,.12); color: var(--success); }
    .flash.error   { background: rgba(239,68,68,.12); color: var(--danger); }

    .container { max-width: 860px; margin: 0 auto; padding: 40px 28px 60px; }

    h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; color: var(--text); }
    .subtitle { color: var(--text-dim); font-size: 14px; margin-bottom: 36px; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      margin-bottom: 20px;
      transition: all .2s;
    }
    .card:hover { border-color: var(--accent); background: #1e2230; }
    .card h2 { font-size: 18px; margin-bottom: 6px; color: var(--text); }
    .card p  { color: var(--text-dim); font-size: 13px; }
    .card .arrow {
      display: inline-block;
      margin-top: 14px;
      font-size: 13px;
      color: var(--accent);
      font-weight: 600;
    }

    table { width: 100%; border-collapse: collapse; margin-bottom: 28px; }
    th, td {
      text-align: left;
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
    }
    th {
      color: var(--text-dim);
      font-weight: 600;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .6px;
    }
    td { color: var(--text-body); }
    td a { word-break: break-all; }

    input[type="text"], input[type="url"] {
      width: 100%;
      padding: 10px 14px;
      background: var(--surface-2);
      border: 1px solid var(--border-h);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border-color .15s;
    }
    input:focus { border-color: var(--accent); }

    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-dim);
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: .5px;
    }

    .form-row { display: flex; gap: 12px; align-items: flex-end; margin-bottom: 16px; }
    .form-row .field { flex: 1; }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s, opacity .15s;
    }
    .btn-primary   { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-h); }
    .btn-danger    { background: transparent; color: var(--danger); border: 1px solid var(--border-h); }
    .btn-danger:hover  { background: var(--danger-h); }
    .btn-ghost     { background: transparent; color: var(--text-dim); border: 1px solid var(--border-h); }
    .btn-ghost:hover   { background: var(--surface-2); color: var(--text); }
    .btn-sm { padding: 6px 12px; font-size: 12px; }

    .edit-form { display: none; }
    .edit-form.active { display: table-row; }
    .actions { display: flex; gap: 6px; }

    @media (max-width: 600px) {
      .form-row { flex-direction: column; }
      .topbar { padding: 12px 16px; }
      .container { padding: 24px 16px 48px; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="nt-icon"></div>
    <span class="brand">Nametag</span>
    <span class="label">Admin</span>
    <div style="margin-left:auto; display:flex; align-items:center; gap:16px;">
      {% if request.endpoint != 'index' %}
      <a href="{{ url_for('index') }}" class="home-link">&larr; Dashboard</a>
      {% endif %}
      <a href="{{ url_for('docs') }}" class="home-link" style="color:var(--accent);">Docs</a>
    </div>
  </div>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
      <div class="flash {{ cat }}">{{ msg }}</div>
    {% endfor %}
  {% endwith %}

  <div class="container">
    {% block content %}{% endblock %}
  </div>
</body>
</html>
